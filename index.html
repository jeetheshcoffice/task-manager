<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Month Wise 1</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
background:#f4f7fb;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#fff;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
overflow:hidden;
}

.title{
background:#0d6efd;
color:#fff;
text-align:center;
padding:18px;
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1ecad3;
padding:12px;
border:1px solid #cfd8dc;
}

td{
padding:12px;
text-align:center;
border:1px solid #cfd8dc;
}

td:first-child{
text-align:left;
font-weight:600;
}

input[type=checkbox]{
width:22px;
height:22px;
cursor:pointer;
}

.status{
padding:15px;
text-align:center;
font-weight:bold;
color:green;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="title">
TASK MANAGER MONTH WISE
</div>

<table>

<tr>
<th>TASK</th>
<th>JUNE</th>
<th>JULY</th>
<th>AUGUST</th>
<th>SEPTEMBER</th>
<th>OCTOBER</th>
<th>NOVEMBER</th>
<th>DECEMBER</th>
</tr>

<tr>
<td>NPS</td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','JUNE')"></td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','JULY')"></td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','AUGUST')"></td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','SEPTEMBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','OCTOBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','NOVEMBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'NPS','DECEMBER')"></td>
</tr>

<tr>
<td>MEDISEP</td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','JUNE')"></td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','JULY')"></td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','AUGUST')"></td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','SEPTEMBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','OCTOBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','NOVEMBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'MEDISEP','DECEMBER')"></td>
</tr>

<tr>
<td>KPEPF</td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','JUNE')"></td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','JULY')"></td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','AUGUST')"></td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','SEPTEMBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','OCTOBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','NOVEMBER')"></td>
<td><input type="checkbox" onchange="saveTask(this,'KPEPF','DECEMBER')"></td>
</tr>

</table>

<div id="status" class="status"></div>

</div>

</div>

<form
id="sheetForm"
action="https://script.google.com/macros/s/AKfycbxFiSVnf5HJnxZRMpNiuQw5V4ZY8Me4ZLvONJ9Fm3EpoEpfszoUKrWmEPJGY39Qva9-fw/exec"
method="POST"
target="hiddenFrame">

<input type="hidden" name="task" id="task">
<input type="hidden" name="month" id="month">
<input type="hidden" name="status" id="statusField">
<input type="hidden" name="date" id="date">

</form>

<iframe name="hiddenFrame" style="display:none"></iframe>

<script>

function saveTask(box, task, month){

document.getElementById("task").value = task;
document.getElementById("month").value = month;
document.getElementById("statusField").value = box.checked;
document.getElementById("date").value =
new Date().toLocaleString();

document.getElementById("sheetForm").submit();

document.getElementById("status").innerHTML =
"✓ Saved Successfully";

setTimeout(()=>{
document.getElementById("status").innerHTML="";
},2000);

}

</script>

</body>
</html>
