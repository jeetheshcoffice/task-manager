<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Manager - Manjeshwar Grama Panchayat</title>

<!-- Enterprise & Professional Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f1f5f9;
    background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
    background-size: 20px 20px;
    color: #0f172a;
    min-height: 100vh;
    padding: 60px 20px 40px; /* Top padding to accommodate loader */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* --------------------------------------
   TOP LOADING BANNER
--------------------------------------- */
#topLoader {
    position: fixed;
    top: -60px; /* Hidden state */
    left: 50%;
    transform: translateX(-50%);
    background: #1e3a8a; /* Official Navy Blue */
    color: #ffffff;
    padding: 12px 24px;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 2000;
}

#topLoader.show {
    top: 0; /* Visible state */
}

/* Spinning Animation for Loader */
.spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* --------------------------------------
   ENTERPRISE CARD DESIGN
--------------------------------------- */
.container {
    width: 100%;
    max-width: 1300px;
    margin: auto;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
    overflow: hidden;
}

.header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 35px 20px;
    text-align: center;
    color: #ffffff;
    border-bottom: 4px solid #10b981;
}

.header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.header h2 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #bfdbfe;
    text-transform: uppercase;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #f8fafc;
    color: #475569;
    padding: 18px 15px;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #e2e8f0;
}

td {
    padding: 20px 10px;
    text-align: center;
    border-bottom: 1px solid #f1f5f9;
    color: #1e293b;
    transition: background 0.2s;
}

tr:nth-child(even) td {
    background-color: #fafaf9;
}

tr:hover td {
    background: #f0f9ff;
}

td:first-child {
    text-align: left;
    font-weight: 600;
    font-size: 16px;
    padding-left: 40px;
    color: #0f172a;
}

.due-badge {
    background: #fffbeb;
    border: 1px solid #fde68a;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 13px;
    color: #b45309;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.cell-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

/* --------------------------------------
   HIGH-CONTRAST CHECKBOXES
--------------------------------------- */
input[type=checkbox] {
    appearance: none;
    width: 26px;
    height: 26px;
    background: #ffffff;
    border: 2px solid #cbd5e1;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
}

input[type=checkbox]:hover {
    border-color: #94a3b8;
}

input[type=checkbox]:checked {
    background: #059669;
    border-color: #059669;
    box-shadow: 0 2px 8px rgba(5, 150, 105, 0.3);
}

input[type=checkbox]:checked:after {
    content: "✓";
    position: absolute;
    left: 5px;
    top: 1px;
    color: white;
    font-weight: bold;
    font-size: 16px;
}

/* Calendar Icon */
.date-icon {
    display: none;
    cursor: pointer;
    font-size: 18px;
    user-select: none;
    transition: transform 0.2s;
    opacity: 0.8;
}

.date-icon:hover {
    transform: scale(1.15);
    opacity: 1;
}

input[type=checkbox]:checked + .date-icon {
    display: inline-block;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.status {
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 15px;
    color: #059669;
    height: 55px;
}

/* --------------------------------------
   PROFESSIONAL LIGHT MODAL
--------------------------------------- */
.popup-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s ease;
    z-index: 1000;
}

.popup-overlay.active {
    opacity: 1;
    visibility: visible;
}

.popup-content {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    color: #0f172a;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    transform: translateY(20px) scale(0.95);
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    max-width: 400px;
    width: 90%;
}

.popup-overlay.active .popup-content {
    transform: translateY(0) scale(1);
}

.close-btn {
    position: absolute;
    top: 15px; right: 20px;
    font-size: 26px;
    cursor: pointer;
    color: #94a3b8;
    transition: 0.2s;
}

.close-btn:hover { color: #0f172a; }
.popup-icon { font-size: 45px; margin-bottom: 15px; }
.popup-content h3 { margin-bottom: 12px; font-weight: 700; font-size: 22px; color: #1e3a8a;}
.popup-content p { font-size: 15px; color: #475569; line-height: 1.6; font-weight: 400;}

</style>
</head>
<body>

<!-- SYSTEM LOADER -->
<div id="topLoader">
    <div class="spinner"></div>
    <span id="loaderText">Loading Database...</span>
</div>

<div class="container">
    <div class="card">
        
        <div class="header">
            <h1>Manjeshwar Grama Panchayat</h1>
            <h2>Task Management System</h2>
        </div>
        
        <table>
            <tr>
                <th>TASK</th>
                <th>DUE DATE</th>
                <th>JUNE</th>
                <th>JULY</th>
                <th>AUGUST</th>
                <th>SEPTEMBER</th>
                <th>OCTOBER</th>
                <th>NOVEMBER</th>
                <th>DECEMBER</th>
            </tr>
            
            <!-- NPS ROW -->
            <tr>
                <td>NPS</td>
                <td><span class="due-badge">5th</span></td>
                <td><div class="cell-wrapper"><input id="NPS_JUNE" type="checkbox" onchange="saveTask(this,'NPS','JUNE')"><span class="date-icon" id="date_NPS_JUNE" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_JULY" type="checkbox" onchange="saveTask(this,'NPS','JULY')"><span class="date-icon" id="date_NPS_JULY" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_AUGUST" type="checkbox" onchange="saveTask(this,'NPS','AUGUST')"><span class="date-icon" id="date_NPS_AUGUST" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_SEPTEMBER" type="checkbox" onchange="saveTask(this,'NPS','SEPTEMBER')"><span class="date-icon" id="date_NPS_SEPTEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_OCTOBER" type="checkbox" onchange="saveTask(this,'NPS','OCTOBER')"><span class="date-icon" id="date_NPS_OCTOBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_NOVEMBER" type="checkbox" onchange="saveTask(this,'NPS','NOVEMBER')"><span class="date-icon" id="date_NPS_NOVEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_DECEMBER" type="checkbox" onchange="saveTask(this,'NPS','DECEMBER')"><span class="date-icon" id="date_NPS_DECEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
            </tr>
            
            <!-- MEDISEP ROW -->
            <tr>
                <td>MEDISEP</td>
                <td><span class="due-badge">5th</span></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_JUNE" type="checkbox" onchange="saveTask(this,'MEDISEP','JUNE')"><span class="date-icon" id="date_MEDISEP_JUNE" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_JULY" type="checkbox" onchange="saveTask(this,'MEDISEP','JULY')"><span class="date-icon" id="date_MEDISEP_JULY" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_AUGUST" type="checkbox" onchange="saveTask(this,'MEDISEP','AUGUST')"><span class="date-icon" id="date_MEDISEP_AUGUST" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_SEPTEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','SEPTEMBER')"><span class="date-icon" id="date_MEDISEP_SEPTEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_OCTOBER" type="checkbox" onchange="saveTask(this,'MEDISEP','OCTOBER')"><span class="date-icon" id="date_MEDISEP_OCTOBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_NOVEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','NOVEMBER')"><span class="date-icon" id="date_MEDISEP_NOVEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_DECEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','DECEMBER')"><span class="date-icon" id="date_MEDISEP_DECEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
            </tr>
            
            <!-- KPEPF ROW -->
            <tr>
                <td>KPEPF</td>
                <td><span class="due-badge">5th</span></td>
                <td><div class="cell-wrapper"><input id="KPEPF_JUNE" type="checkbox" onchange="saveTask(this,'KPEPF','JUNE')"><span class="date-icon" id="date_KPEPF_JUNE" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_JULY" type="checkbox" onchange="saveTask(this,'KPEPF','JULY')"><span class="date-icon" id="date_KPEPF_JULY" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_AUGUST" type="checkbox" onchange="saveTask(this,'KPEPF','AUGUST')"><span class="date-icon" id="date_KPEPF_AUGUST" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_SEPTEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','SEPTEMBER')"><span class="date-icon" id="date_KPEPF_SEPTEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_OCTOBER" type="checkbox" onchange="saveTask(this,'KPEPF','OCTOBER')"><span class="date-icon" id="date_KPEPF_OCTOBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_NOVEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','NOVEMBER')"><span class="date-icon" id="date_KPEPF_NOVEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_DECEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','DECEMBER')"><span class="date-icon" id="date_KPEPF_DECEMBER" onclick="showDate(this)" title="View Date">📅</span></div></td>
            </tr>
        </table>
        
        <div class="status" id="status"></div>
    </div>
</div>

<!-- Professional Popup Modal -->
<div id="datePopup" class="popup-overlay" onclick="closePopup(event)">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <div class="popup-icon">✅</div>
        <h3 id="popupTitle">Task Verified</h3>
        <p id="popupMessage">Loading date...</p>
    </div>
</div>

<!-- Google Apps Script Form Submission -->
<form id="sheetForm" action="https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec" method="POST" target="hiddenFrame">
    <input type="hidden" name="task" id="task">
    <input type="hidden" name="month" id="month">
    <input type="hidden" name="status" id="statusField">
    <input type="hidden" name="date" id="date">
</form>

<!-- ADDED ONLOAD LISTENER TO IFRAME -->
<iframe name="hiddenFrame" id="hiddenFrame" style="display:none" onload="handleIframeLoad()"></iframe>

<script>
// --- Loader Functions ---
function setLoader(state, text = "") {
    const loader = document.getElementById("topLoader");
    const loaderText = document.getElementById("loaderText");
    
    if (state === "show") {
        loaderText.innerText = text;
        loader.classList.add("show");
    } else {
        loader.classList.remove("show");
    }
}

// Show loader instantly when page opens
setLoader("show", "Connecting to Database...");

// --- Task Saving Logic ---
let isSubmitting = false; // Safely track if we are actually syncing

function saveTask(box, task, month){
    const elementId = task + "_" + month;
    const icon = document.getElementById("date_" + elementId);
    
    // Formatting a cleaner date string
    const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    const timestamp = new Date().toLocaleDateString('en-US', options);

    document.getElementById("task").value = task;
    document.getElementById("month").value = month;
    document.getElementById("statusField").value = box.checked;
    document.getElementById("date").value = timestamp;

    if (box.checked && icon) {
        icon.setAttribute("data-date", timestamp);
    } else if (icon) {
        icon.removeAttribute("data-date");
    }

    // Trigger Loading UI
    isSubmitting = true;
    setLoader("show", "Syncing Update...");
    document.getElementById("sheetForm").submit();

    // FAILSAFE: If the browser blocks the iframe onload event, close it after 2.5 seconds anyway
    setTimeout(() => {
        if (isSubmitting) {
            completeSync();
        }
    }, 2500);
}

// --- Iframe Completion Trigger ---
function handleIframeLoad() {
    if (isSubmitting) {
        completeSync();
    }
}

function completeSync() {
    isSubmitting = false;
    setLoader("hide"); // Hide the drop-down loader
    
    const statusDiv = document.getElementById("status");
    statusDiv.innerHTML = "✓ Securely Synced to Database";
    statusDiv.style.opacity = 1;
    
    setTimeout(() => {
        statusDiv.innerHTML = "";
    }, 3000);
}

// --- Data Loading Logic ---
function loadSavedData(data){
    data.forEach(row => {
        if(String(row.status).toUpperCase() == "TRUE"){
            const id = row.task + "_" + row.month;
            const cb = document.getElementById(id);
            const icon = document.getElementById("date_" + id);

            if(cb) cb.checked = true;
            if(icon && row.date) icon.setAttribute("data-date", row.date);
        }
    });
    
    // Data has finished loading, remove the loader!
    setLoader("hide");
}

// --- Smooth Popup Logic ---
function showDate(icon) {
    const savedDate = icon.getAttribute("data-date");
    const popup = document.getElementById("datePopup");
    const title = document.getElementById("popupTitle");
    const message = document.getElementById("popupMessage");
    
    if(savedDate) {
        title.innerText = "Task Verified";
        message.innerHTML = `This task was securely recorded on:<br><br><strong style="color:#0f172a; font-size: 16px;">${savedDate}</strong>`;
    } else {
        title.innerText = "Syncing Record...";
        message.innerText = "Data is still syncing with the server. Please check back in a moment.";
    }
    
    popup.classList.add("active");
}

function closePopup(event) {
    if (!event || event.target.id === 'datePopup' || event.target.className === 'close-btn') {
        document.getElementById("datePopup").classList.remove("active");
    }
}

// Inject Script to fetch data from Google Apps Script
const script = document.createElement("script");
script.src = "https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec?callback=loadSavedData";
document.body.appendChild(script);
</script>

</body>
</html>
