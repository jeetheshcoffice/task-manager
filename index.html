<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f6fb;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header{
background:linear-gradient(135deg,#3b82f6,#06b6d4);
padding:25px;
text-align:center;
color:white;
font-size:32px;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#11c5d9;
color:white;
padding:15px;
}

td{
padding:18px;
text-align:center;
border-bottom:1px solid #eee;
vertical-align: middle;
}

td:first-child{
text-align:left;
font-weight:600;
}

/* Flex wrapper inside cells to align checkbox and calendar cleanly */
.cell-wrapper {
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
}

input[type=checkbox]{
appearance:none;
width:28px;
height:28px;
border:2px solid #bfc9d7;
border-radius:8px;
cursor:pointer;
position:relative;
transition:.3s;
}

input[type=checkbox]:checked{
background:#22c55e;
border-color:#22c55e;
}

input[type=checkbox]:checked:after{
content:"✓";
position:absolute;
left:7px;
top:0;
color:white;
font-weight:bold;
}

/* Style for the calendar icon */
.date-icon {
display: none;
cursor: pointer;
font-size: 16px;
user-select: none;
transition: transform 0.2s;
}

.date-icon:hover {
transform: scale(1.2);
}

/* Auto-display calendar icon only when checkbox is checked */
input[type=checkbox]:checked + .date-icon {
display: inline-block;
}

.status{
padding:15px;
text-align:center;
font-weight:600;
color:#16a34a;
}

</style>

</head>

<div class="card">

</div>

<th>JUNE</th>

<form
id="sheetForm"
action="https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec"
method="POST"
target="hiddenFrame">

<input type="hidden" name="task" id="task">
<input type="hidden" name="month" id="month">
<input type="hidden" name="status" id="statusField">
<input type="hidden" name="date" id="date">

</form>

<iframe name="hiddenFrame" style="display:none"></iframe>

<script>

function saveTask(box,task,month){

const elementId = task + "_" + month;
const icon = document.getElementById("date_" + elementId);
const timestamp = new Date().toLocaleString();

document.getElementById("task").value=task;
document.getElementById("month").value=month;
document.getElementById("statusField").value=box.checked;
document.getElementById("date").value=timestamp;

// Instantly apply timestamp to icon data attribute locally
if (box.checked && icon) {
  icon.setAttribute("data-date", timestamp);
} else if (icon) {
  icon.removeAttribute("data-date");
}

document.getElementById("sheetForm").submit();

document.getElementById("status").innerHTML=
"✓ Saved Successfully";

setTimeout(()=>{
document.getElementById("status").innerHTML="";
},2000);

}

function showDate(icon) {
  const savedDate = icon.getAttribute("data-date");
  if(savedDate) {
    alert("Completed on: " + savedDate);
  } else {
    alert("Date tracking syncing with Google Sheet...");
  }
}

function loadSavedData(data){

data.forEach(row=>{

if(String(row.status).toUpperCase()=="TRUE"){

const id=row.task+"_"+row.month;
const cb=document.getElementById(id);
const icon=document.getElementById("date_" + id);

if(cb){
cb.checked=true;
}

if(icon && row.date){
icon.setAttribute("data-date", row.date);
}

}

});

}

const script=document.createElement("script");

script.src=
"https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec?callback=loadSavedData";

document.body.appendChild(script);

</script>
