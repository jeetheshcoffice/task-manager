<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f6fb;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header{
background:linear-gradient(135deg,#3b82f6,#06b6d4);
padding:25px;
text-align:center;
color:white;
font-size:32px;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#11c5d9;
color:white;
padding:15px;
}

td{
padding:18px;
text-align:center;
border-bottom:1px solid #eee;
}

td:first-child{
text-align:left;
font-weight:600;
}

input[type=checkbox]{
appearance:none;
width:28px;
height:28px;
border:2px solid #bfc9d7;
border-radius:8px;
cursor:pointer;
position:relative;
transition:.3s;
}

input[type=checkbox]:checked{
background:#22c55e;
border-color:#22c55e;
}

input[type=checkbox]:checked:after{
content:"✓";
position:absolute;
left:7px;
top:0;
color:white;
font-weight:bold;
}

.status{
padding:15px;
text-align:center;
font-weight:600;
color:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">
TASK MANAGER 1
</div>

<table>

<tr>
<th>TASK</th>
<th>JUNE</th>
<th>JULY</th>
<th>AUGUST</th>
<th>SEPTEMBER</th>
<th>OCTOBER</th>
<th>NOVEMBER</th>
<th>DECEMBER</th>
</tr>

<tr>
<td>NPS</td>

<td><input id="NPS_JUNE" type="checkbox" onchange="saveTask(this,'NPS','JUNE')"></td>
<td><input id="NPS_JULY" type="checkbox" onchange="saveTask(this,'NPS','JULY')"></td>
<td><input id="NPS_AUGUST" type="checkbox" onchange="saveTask(this,'NPS','AUGUST')"></td>
<td><input id="NPS_SEPTEMBER" type="checkbox" onchange="saveTask(this,'NPS','SEPTEMBER')"></td>
<td><input id="NPS_OCTOBER" type="checkbox" onchange="saveTask(this,'NPS','OCTOBER')"></td>
<td><input id="NPS_NOVEMBER" type="checkbox" onchange="saveTask(this,'NPS','NOVEMBER')"></td>
<td><input id="NPS_DECEMBER" type="checkbox" onchange="saveTask(this,'NPS','DECEMBER')"></td>
</tr>

<tr>
<td>MEDISEP</td>

<td><input id="MEDISEP_JUNE" type="checkbox" onchange="saveTask(this,'MEDISEP','JUNE')"></td>
<td><input id="MEDISEP_JULY" type="checkbox" onchange="saveTask(this,'MEDISEP','JULY')"></td>
<td><input id="MEDISEP_AUGUST" type="checkbox" onchange="saveTask(this,'MEDISEP','AUGUST')"></td>
<td><input id="MEDISEP_SEPTEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','SEPTEMBER')"></td>
<td><input id="MEDISEP_OCTOBER" type="checkbox" onchange="saveTask(this,'MEDISEP','OCTOBER')"></td>
<td><input id="MEDISEP_NOVEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','NOVEMBER')"></td>
<td><input id="MEDISEP_DECEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','DECEMBER')"></td>
</tr>

<tr>
<td>KPEPF</td>

<td><input id="KPEPF_JUNE" type="checkbox" onchange="saveTask(this,'KPEPF','JUNE')"></td>
<td><input id="KPEPF_JULY" type="checkbox" onchange="saveTask(this,'KPEPF','JULY')"></td>
<td><input id="KPEPF_AUGUST" type="checkbox" onchange="saveTask(this,'KPEPF','AUGUST')"></td>
<td><input id="KPEPF_SEPTEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','SEPTEMBER')"></td>
<td><input id="KPEPF_OCTOBER" type="checkbox" onchange="saveTask(this,'KPEPF','OCTOBER')"></td>
<td><input id="KPEPF_NOVEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','NOVEMBER')"></td>
<td><input id="KPEPF_DECEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','DECEMBER')"></td>
</tr>

</table>

<div class="status" id="status"></div>

</div>

</div>

<form
id="sheetForm"
action="https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec"
method="POST"
target="hiddenFrame">

<input type="hidden" name="task" id="task">
<input type="hidden" name="month" id="month">
<input type="hidden" name="status" id="statusField">
<input type="hidden" name="date" id="date">

</form>

<iframe name="hiddenFrame" style="display:none"></iframe>

<script>

function saveTask(box,task,month){

document.getElementById("task").value=task;
document.getElementById("month").value=month;
document.getElementById("statusField").value=box.checked;
document.getElementById("date").value=new Date().toLocaleString();

document.getElementById("sheetForm").submit();

document.getElementById("status").innerHTML=
"✓ Saved Successfully";

setTimeout(()=>{
document.getElementById("status").innerHTML="";
},2000);

}

function loadSavedData(data){

data.forEach(row=>{

if(String(row.status).toUpperCase()=="TRUE"){

const id=row.task+"_"+row.month;

const cb=document.getElementById(id);

if(cb){
cb.checked=true;
}

}

});

}

// Script loading configured with your Google Apps Script URL
const script=document.createElement("script");

script.src=
"https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec?callback=loadSavedData";

document.body.appendChild(script);

</script>

</body>
</html>
