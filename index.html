<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Manager - Manjeshwar Grama Panchayat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f1f5f9;
    background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
    background-size: 20px 20px;
    color: #0f172a;
    min-height: 100vh;
    padding: 60px 20px 40px; 
    display: flex;
    justify-content: center;
    align-items: center;
}

/* --------------------------------------
   TOP LOADING BANNER
--------------------------------------- */
#topLoader {
    position: fixed;
    top: -60px; /* Hidden state */
    left: 50%;
    transform: translateX(-50%);
    background: #1e3a8a; /* Official Navy Blue */
    color: #ffffff;
    padding: 12px 24px;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 2000;
}

#topLoader.show {
    top: 0; /* Visible state */
}

/* Spinning Animation for Loader */
.spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* --------------------------------------
   ENTERPRISE CARD DESIGN
--------------------------------------- */
.container {
    width: 100%;
    max-width: 1300px;
    margin: auto;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
    overflow: hidden;
}

.header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 35px 20px;
    text-align: center;
    color: #ffffff;
    border-bottom: 4px solid #10b981;
}

.header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.header h2 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #bfdbfe;
    text-transform: uppercase;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #f8fafc;
    color: #475569;
    padding: 18px 15px;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #e2e8f0;
}

td {
    padding: 20px 10px;
    text-align: center;
    border-bottom: 1px solid #f1f5f9;
    color: #1e293b;
    transition: background 0.2s;
}

tr:nth-child(even) td {
    background-color: #fafaf9;
}

tr:hover td {
    background: #f0f9ff;
}

td:first-child {
    text-align: left;
    font-weight: 600;
    font-size: 16px;
    padding-left: 40px;
    color: #0f172a;
}

.due-badge {
    background: #fffbeb;
    border: 1px solid #fde68a;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 13px;
    color: #b45309;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.cell-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

/* --------------------------------------
   HIGH-CONTRAST CHECKBOXES
--------------------------------------- */
input[type=checkbox] {
    appearance: none;
    width: 26px;
    height: 26px;
    background: #ffffff;
    border: 2px solid #cbd5e1;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
}

input[type=checkbox]:hover {
    border-color: #94a3b8;
}

input[type=checkbox]:checked {
    background: #059669;
    border-color: #059669;
    box-shadow: 0 2px 8px rgba(5, 150, 105, 0.3);
}

input[type=checkbox]:checked:after {
    content: "✓";
    position: absolute;
    left: 5px;
    top: 1px;
    color: white;
    font-weight: bold;
    font-size: 16px;
}

.status {
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 15px;
    color: #059669;
    height: 55px;
}
</style>
</head>
<body>

<div id="topLoader">
    <div class="spinner"></div>
    <span id="loaderText">Loading Database...</span>
</div>

<div class="container">
    <div class="card">
        
        <div class="header">
            <h1>Manjeshwar Grama Panchayat</h1>
            <h2>Task Management System</h2>
        </div>
        
        <table>
            <tr>
                <th>TASK</th>
                <th>DUE DATE</th>
                <th>JUNE</th>
                <th>JULY</th>
                <th>AUGUST</th>
                <th>SEPTEMBER</th>
                <th>OCTOBER</th>
                <th>NOVEMBER</th>
                <th>DECEMBER</th>
            </tr>
            
            <tr>
                <td>NPS</td>
                <td><span class="due-badge">5th</span></td>
                <td><div class="cell-wrapper"><input id="NPS_JUNE" type="checkbox" onchange="saveTask(this,'NPS','JUNE')"></div></td>
                <td><div class="cell-wrapper"><input id="NPS_JULY" type="checkbox" onchange="saveTask(this,'NPS','JULY')"></div></td>
                <td><div class="cell-wrapper"><input id="NPS_AUGUST" type="checkbox" onchange="saveTask(this,'NPS','AUGUST')"></div></td>
                <td><div class="cell-wrapper"><input id="NPS_SEPTEMBER" type="checkbox" onchange="saveTask(this,'NPS','SEPTEMBER')"></div></td>
                <td><div class="cell-wrapper"><input id="NPS_OCTOBER" type="checkbox" onchange="saveTask(this,'NPS','OCTOBER')"></div></td>
                <td><div class="cell-wrapper"><input id="NPS_NOVEMBER" type="checkbox" onchange="saveTask(this,'NPS','NOVEMBER')"></div></td>
                <td><div class="cell-wrapper"><input id="NPS_DECEMBER" type="checkbox" onchange="saveTask(this,'NPS','DECEMBER')"></div></td>
            </tr>
            
            <tr>
                <td>MEDISEP</td>
                <td><span class="due-badge">5th</span></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_JUNE" type="checkbox" onchange="saveTask(this,'MEDISEP','JUNE')"></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_JULY" type="checkbox" onchange="saveTask(this,'MEDISEP','JULY')"></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_AUGUST" type="checkbox" onchange="saveTask(this,'MEDISEP','AUGUST')"></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_SEPTEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','SEPTEMBER')"></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_OCTOBER" type="checkbox" onchange="saveTask(this,'MEDISEP','OCTOBER')"></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_NOVEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','NOVEMBER')"></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_DECEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','DECEMBER')"></div></td>
            </tr>
            
            <tr>
                <td>KPEPF</td>
                <td><span class="due-badge">5th</span></td>
                <td><div class="cell-wrapper"><input id="KPEPF_JUNE" type="checkbox" onchange="saveTask(this,'KPEPF','JUNE')"></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_JULY" type="checkbox" onchange="saveTask(this,'KPEPF','JULY')"></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_AUGUST" type="checkbox" onchange="saveTask(this,'KPEPF','AUGUST')"></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_SEPTEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','SEPTEMBER')"></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_OCTOBER" type="checkbox" onchange="saveTask(this,'KPEPF','OCTOBER')"></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_NOVEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','NOVEMBER')"></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_DECEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','DECEMBER')"></div></td>
            </tr>
        </table>
        
        <div class="status" id="status"></div>
    </div>
</div>

<form id="sheetForm" action="https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec" method="POST" target="hiddenFrame">
    <input type="hidden" name="task" id="task">
    <input type="hidden" name="month" id="month">
    <input type="hidden" name="status" id="statusField">
    <input type="hidden" name="date" id="date">
</form>

<iframe name="hiddenFrame" id="hiddenFrame" style="display:none" onload="handleIframeLoad()"></iframe>

<script>
// --- Loader Functions ---
function setLoader(state, text = "") {
    const loader = document.getElementById("topLoader");
    const loaderText = document.getElementById("loaderText");
    
    if (state === "show") {
        loaderText.innerText = text;
        loader.classList.add("show");
    } else {
        loader.classList.remove("show");
    }
}

setLoader("show", "Connecting to Database...");

// --- Task Saving Logic ---
let isSubmitting = false; 

function saveTask(box, task, month){
    const timestamp = new Date().toLocaleString();

    document.getElementById("task").value = task;
    document.getElementById("month").value = month;
    document.getElementById("statusField").value = box.checked;
    document.getElementById("date").value = timestamp;

    isSubmitting = true;
    setLoader("show", "Syncing Update...");
    document.getElementById("sheetForm").submit();

    setTimeout(() => {
        if (isSubmitting) {
            completeSync();
        }
    }, 2500);
}

function handleIframeLoad() {
    if (isSubmitting) {
        completeSync();
    }
}

function completeSync() {
    isSubmitting = false;
    setLoader("hide"); 
    
    const statusDiv = document.getElementById("status");
    statusDiv.innerHTML = "✓ Securely Synced to Database";
    
    setTimeout(() => {
        statusDiv.innerHTML = "";
    }, 3000);
}

// --- Data Loading Logic ---
function loadSavedData(data){
    data.forEach(row => {
        if(String(row.status).toUpperCase() == "TRUE"){
            const id = row.task + "_" + row.month;
            const cb = document.getElementById(id);
            if(cb) cb.checked = true;
        }
    });
    
    setLoader("hide");
}

const script = document.createElement("script");
script.src = "https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec?callback=loadSavedData";
document.body.appendChild(script);
</script>

</body>
</html>
